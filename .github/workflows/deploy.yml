name: Deploy - Vercel (prod)

# Corre despues de un push a main, y solo si CI ya paso (needs no aplica entre
# archivos de workflow distintos en GitHub Actions -- por eso este archivo
# vuelve a correr build/test el mismo commit por su cuenta, como capa extra
# antes de gastar un deploy real).
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      # vercel pull trae la configuracion del proyecto (a que Environment
      # de Vercel corresponde, variables de entorno, etc.) usando el
      # PROJECT_ID/ORG_ID -- son 3 secrets que hay que crear en GitHub
      # despues de conectar este repo a un proyecto de Vercel (ver README).
      - name: Traer config de Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # El build corre ACA (en el runner de GitHub), no del lado de Vercel --
      # asi el codigo fuente nunca sale de este pipeline.
      - name: Build (en GitHub Actions, no en Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # --prebuilt: sube el resultado ya construido en el paso anterior,
      # en vez de pedirle a Vercel que lo vuelva a construir.
      - name: Deploy a produccion
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
